apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: secureflow
  # CK-07 — missing required labels.
spec:
  replicas: 1
  selector:
    matchLabels:
      svc: auth-service
  template:
    metadata:
      labels:
        svc: auth-service
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "auth-service"
        vault.hashicorp.com/agent-inject-secret-auth-service.env: "secureflow/data/auth-service"
        vault.hashicorp.com/agent-inject-template-auth-service.env: |
          {{- with secret "secureflow/data/auth-service" -}}
          export DB_USER="{{ .Data.data.DB_USER }}"
          export DB_PASSWORD="{{ .Data.data.DB_PASSWORD }}"
          export JWT_SECRET="{{ .Data.data.JWT_SECRET }}"
          {{- end }}
    spec:
      serviceAccountName: auth-service
      containers:
        - name: auth-service
          # CK-06 — :latest tag.
          image: secureflow/auth-service:latest
          ports:
            - containerPort: 5001
          envFrom:
            - configMapRef:
                name: secureflow-config
          env:
            - name: DB_HOST
              value: auth-db
            - name: DB_NAME
              value: authdb
          # CK-04 — privileged container with privilege escalation.
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            runAsUser: 0
          # CK-05 — no resources.
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: secureflow
spec:
  selector:
    svc: auth-service
  ports:
    - port: 5001
      targetPort: 5001

