apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: secureflow
spec:
  replicas: 1
  selector:
    matchLabels:
      svc: frontend
  template:
    metadata:
      labels:
        svc: frontend
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "frontend"
        vault.hashicorp.com/agent-inject-secret-frontend.env: "secureflow/data/frontend"
        vault.hashicorp.com/agent-inject-template-frontend.env: |
          {{- with secret "secureflow/data/frontend" -}}
          export API_BASE_URL="{{ .Data.data.API_BASE_URL }}"
          {{- end }}
    spec:
      serviceAccountName: frontend
      containers:
        - name: frontend
          image: secureflow/frontend:latest   # CK-06
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: secureflow-config
          securityContext:
            privileged: true                # CK-04
            allowPrivilegeEscalation: true  # CK-04
            runAsUser: 0                    # CK-02
          # CK-05 — no resources.
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: secureflow
spec:
  type: NodePort
  selector:
    svc: frontend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30080


   