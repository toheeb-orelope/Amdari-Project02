apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: secureflow
spec:
  replicas: 1
  selector:
    matchLabels:
      svc: frontend
  template:
    metadata:
      labels:
        svc: frontend
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "frontend"
        vault.hashicorp.com/agent-inject-secret-frontend.env: "secureflow/data/frontend"
        vault.hashicorp.com/agent-inject-template-frontend.env: |
          {{- with secret "secureflow/data/frontend" -}}
          export API_BASE_URL="{{ .Data.data.API_BASE_URL }}"
          {{- end }}
    spec:
      serviceAccountName: frontend
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: secureflow/frontend:v1.0.0@sha256:5c5f7f2b3a54bb4ec19cf9f2d0f8a7e42043a7f3a174f9c41df70d5f568f8c55
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: secureflow-config
          securityContext:
            privileged: false                # CK-04
            allowPrivilegeEscalation: false  # CK-04
            readOnlyRootFilesystem: true          # CK-04
            capabilities:
              drop: ["ALL"]                      # CK-04
          # CK-05 — no resources.
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
          # CK-05 — no resources.
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: secureflow
spec:
  type: NodePort
  selector:
    svc: frontend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30080


   
