apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
  namespace: secureflow
spec:
  replicas: 1
  selector:
    matchLabels:
      svc: transaction-service
  template:
    metadata:
      labels:
        svc: transaction-service
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "transaction-service"
        vault.hashicorp.com/agent-inject-secret-transaction-service.env: "secureflow/data/transaction-service"
        vault.hashicorp.com/agent-inject-template-transaction-service.env: |
          {{- with secret "secureflow/data/transaction-service" -}}
          export DB_USER="{{ .Data.data.DB_USER }}"
          export DB_PASSWORD="{{ .Data.data.DB_PASSWORD }}"
          {{- end }}
    spec:
      serviceAccountName: transaction-service
      containers:
        - name: transaction-service
          image: secureflow/transaction-service:v1.0.0   # CK-06
          ports:
            - containerPort: 5002
          envFrom:
            - configMapRef:
                name: secureflow-config
          env:
            - name: DB_HOST
              value: transaction-db
            - name: DB_NAME
              value: transactiondb
          securityContext:
            privileged: false                # CK-04
            allowPrivilegeEscalation: false  # CK-04
            runAsUser: 1000                    # CK-02
            runAsNonRoot: true
            readOnlyRootFilesystem: true          # CK-04
            capabilities:
              drop: ["ALL"]                      # CK-04
          # CK-05 — no resources.
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-service
  namespace: secureflow
spec:
  selector:
    svc: transaction-service
  ports:
    - port: 5002
      targetPort: 5002