name: Security Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  packages: write
  pull-requests: write
  security-events: write

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks full history scan
        continue-on-error: true
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/path \
            --workdir /path \
            ghcr.io/gitleaks/gitleaks:latest \
            git \
            --log-opts="--all" \
            --config=".gitleaks.toml" \
            --report-format=json \
            --report-path=gitleaks-report.json \
            --verbose

      - name: Ensure Gitleaks report exists
        if: always()
        run: |
          test -f gitleaks-report.json || echo "[]" > gitleaks-report.json

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  sast-scan:
    name: SAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Export Sonar findings as JSON
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          mkdir -p security-findings

          if [ -n "$SONAR_TOKEN" ] && [ -n "$SONAR_PROJECT_KEY" ]; then
            curl -s -u "$SONAR_TOKEN:" \
              "https://sonarcloud.io/api/issues/search?componentKeys=$SONAR_PROJECT_KEY&severities=BLOCKER,CRITICAL&resolved=false&ps=500" \
              -o security-findings/sonar-findings.json
          else
            echo '{"issues":[]}' > security-findings/sonar-findings.json
          fi

      - name: Upload Sonar findings artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-security-findings
          path: security-findings/sonar-findings.json

  image-scan:
    name: Image Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build service images
        run: |
          docker build -t secureflow-auth:${{ github.sha }} services/auth-service
          docker build -t secureflow-frontend:${{ github.sha }} services/frontend
          docker build -t secureflow-transaction:${{ github.sha }} services/transaction-service

      - name: Scan auth-service image for HIGH/CRITICAL CVEs
        id: auth_image_scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: secureflow-auth:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 0
          vuln-type: os,library
          format: json
          output: trivy-image-auth-service-report.json

      - name: Scan frontend image for HIGH/CRITICAL CVEs
        id: frontend_image_scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: secureflow-frontend:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 0
          vuln-type: os,library
          format: json
          output: trivy-image-frontend-report.json

      - name: Scan transaction-service image for HIGH/CRITICAL CVEs
        id: transaction_image_scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: secureflow-transaction:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 0
          vuln-type: os,library
          format: json
          output: trivy-image-transaction-service-report.json

      - name: Ensure Trivy image reports exist
        if: always()
        run: |
          test -f trivy-image-auth-service-report.json || echo '{"Results":[]}' > trivy-image-auth-service-report.json
          test -f trivy-image-frontend-report.json || echo '{"Results":[]}' > trivy-image-frontend-report.json
          test -f trivy-image-transaction-service-report.json || echo '{"Results":[]}' > trivy-image-transaction-service-report.json

      - name: Upload Trivy image reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-reports
          path: trivy-image-*-report.json

  iac-scan:
    name: IaC Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov Terraform scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/terraform
          framework: terraform
          skip_check: CKV_AWS_144,CKV2_AWS_57
          soft_fail: true

      - name: Run Trivy Kubernetes scan
        id: trivy_k8s_scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: infra/kubernetes/
          severity: CRITICAL,HIGH
          exit-code: 0
          format: json
          output: trivy-kubernetes-report.json

      - name: Run Checkov Terraform scan
        continue-on-error: true
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/terraform
          framework: terraform
          output_format: cli,sarif,json
          output_file_path: console,checkov-terraform.sarif,checkov-terraform.json
          soft_fail: true

      - name: Run Checkov Kubernetes scan
        continue-on-error: true
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/kubernetes
          framework: kubernetes
          output_format: cli,sarif,json
          output_file_path: console,checkov-kubernetes.sarif,checkov-kubernetes.json
          soft_fail: true

      - name: Ensure IaC reports exist
        if: always()
        run: |
          test -f trivy-kubernetes-report.json || echo '{"Results":[]}' > trivy-kubernetes-report.json
          test -f checkov-terraform.json || echo '{"results":{"failed_checks":[]}}' > checkov-terraform.json
          test -f checkov-kubernetes.json || echo '{"results":{"failed_checks":[]}}' > checkov-kubernetes.json

      - name: Upload IaC reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iac-reports
          path: |
            trivy-kubernetes-report.json
            checkov-terraform.json
            checkov-kubernetes.json
            checkov-terraform.sarif
            checkov-kubernetes.sarif

  dast-scan:
    name: DAST Scan
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Run OWASP ZAP baseline scan against staging
        id: zap_baseline
        continue-on-error: true
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}
        run: |
          mkdir -p zap-output

          if [ -z "$STAGING_URL" ]; then
            cat > zap-output/zap-report.json <<'JSON'
          {
            "site": [],
            "scan_skipped": true,
            "skip_reason": "STAGING_URL repository variable is not configured."
          }
          JSON
            cat > zap-output/zap-report.md <<'MD'
          # OWASP ZAP Baseline Scan

          Scan skipped because the `STAGING_URL` repository variable is not configured.
          MD
            echo "<html><body><h1>OWASP ZAP Baseline Scan</h1><p>Scan skipped because STAGING_URL is not configured.</p></body></html>" > zap-output/zap-report.html
            exit 0
          fi

          docker run --rm \
            -v "${{ github.workspace }}/zap-output:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t "$STAGING_URL" \
            -J zap-report.json \
            -w zap-report.md \
            -r zap-report.html

      - name: Ensure ZAP reports exist
        if: always()
        run: |
          mkdir -p zap-output
          test -f zap-output/zap-report.json || echo '{"site":[]}' > zap-output/zap-report.json
          test -f zap-output/zap-report.md || echo "# OWASP ZAP Baseline Scan" > zap-output/zap-report.md
          test -f zap-output/zap-report.html || echo "<html><body><h1>OWASP ZAP Baseline Scan</h1></body></html>" > zap-output/zap-report.html

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: zap-output/

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-scan, image-scan, iac-scan, dast-scan]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Gitleaks report
        uses: actions/download-artifact@v4
        with:
          name: gitleaks-report
          path: .

      - name: Download SonarQube report
        uses: actions/download-artifact@v4
        with:
          name: sonar-security-findings
          path: security-findings

      - name: Download Trivy image report
        uses: actions/download-artifact@v4
        with:
          name: trivy-image-reports
          path: .

      - name: Download IaC reports
        uses: actions/download-artifact@v4
        with:
          name: iac-reports
          path: .

      - name: Download ZAP DAST report
        uses: actions/download-artifact@v4
        with:
          name: zap-dast-report
          path: zap-output

      - name: Run Security Gate Evaluator
        id: security_gate
        env:
          APPSEC_INTAKE_URL: ${{ vars.APPSEC_INTAKE_URL }}
        run: bash pipeline/scripts/security-gate.sh
        continue-on-error: true

      - name: Post Security Gate Comments to PR
        if: env.COMMENT_STATE == 'true' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body-file pr_comment_payload.md

      - name: Enforce Gate Status
        if: env.FAIL_STATE == 'true'
        run: |
          echo "Blocking deployment due to previous security gate violations."
          exit 1

  sign-and-verify-images:
    name: Sign and Verify Images
    runs-on: ubuntu-latest
    needs: security-gate
    if: github.event_name != 'pull_request' && needs.security-gate.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: v0.71.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, push, sign, and verify hardened images
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_PUBLIC_KEY: ${{ vars.COSIGN_PUBLIC_KEY }}
          TRIVY_NO_PROGRESS: "true"
        run: |
          if [ -z "$COSIGN_PRIVATE_KEY" ] || [ -z "$COSIGN_PASSWORD" ] || [ -z "$COSIGN_PUBLIC_KEY" ]; then
            echo "Missing COSIGN_PRIVATE_KEY, COSIGN_PASSWORD, or COSIGN_PUBLIC_KEY configuration."
            exit 1
          fi

          printf "%s" "$COSIGN_PUBLIC_KEY" > cosign.pub

          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(basename "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"

          for service in auth-service frontend transaction-service; do
            image="ghcr.io/${owner}/${repo}-${service}:${GITHUB_SHA}"

            docker build -t "$image" "services/${service}"
            docker push "$image"

            digest="$(docker buildx imagetools inspect "$image" | awk '/Digest:/ {print $2; exit}')"
            if [ -z "$digest" ]; then
              echo "Unable to resolve digest for ${image}."
              exit 1
            fi

            image_digest="${image%@*}@${digest}"

            echo "Signing ${image_digest}"
            cosign sign --yes --key env://COSIGN_PRIVATE_KEY "$image_digest"

            sbom_file="${service}-sbom.spdx.json"

            echo "Generating SPDX SBOM for ${image_digest}"
            trivy image --format spdx-json --output "$sbom_file" "$image_digest"

            echo "Attaching SPDX SBOM attestation to ${image_digest}"
            cosign attest --yes --key env://COSIGN_PRIVATE_KEY --type spdx --predicate "$sbom_file" "$image_digest"

            echo "Verifying ${image_digest}"
            cosign verify --key cosign.pub "$image_digest"

            echo "Verifying SPDX SBOM attestation for ${image_digest}"
            cosign verify-attestation --key cosign.pub --type spdx "$image_digest" > "${service}-sbom-attestation.json"
          done

      - name: Upload SBOM and attestation verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-image-sboms
          path: |
            *-sbom.spdx.json
            *-sbom-attestation.json
