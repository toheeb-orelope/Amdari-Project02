name: Trivy Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  trivy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build transaction-service image
        run: |
          docker build -t secureflow-transaction:${{ github.sha }} services/transaction-service

      - name: Scan image for HIGH/CRITICAL CVEs
        id: image_scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: secureflow-transaction:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1
          vuln-type: os,library
          format: table

      - name: Scan Kubernetes manifests
        id: k8s_scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: infra/kubernetes/
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

      - name: Fail pipeline if Trivy found issues
        if: steps.image_scan.outcome == 'failure' || steps.k8s_scan.outcome == 'failure'
        run: exit 1