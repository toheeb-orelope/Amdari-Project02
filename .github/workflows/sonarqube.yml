name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Export Sonar findings as JSON
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          mkdir -p security-findings

          curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=$SONAR_PROJECT_KEY&severities=BLOCKER,CRITICAL&resolved=false&ps=500" \
            -o security-findings/sonar-findings.json

      - name: Hard fail only on CRITICAL/BLOCKER
        run: |
          python3 - <<'PY'
          import json
          import sys

          with open("security-findings/sonar-findings.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          issues = data.get("issues", [])
          count = len(issues)

          print(f"CRITICAL/BLOCKER findings: {count}")

          if count > 0:
              for issue in issues:
                  print(f"- {issue.get('severity')} | {issue.get('component')} | {issue.get('message')}")
              sys.exit(1)

          print("No CRITICAL/BLOCKER findings found.")
          PY

      - name: Upload Sonar findings artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-security-findings
          path: security-findings/sonar-findings.json