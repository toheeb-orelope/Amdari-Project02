name: Gitleaks Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks full history scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/path \
            --workdir /path \
            ghcr.io/gitleaks/gitleaks:latest \
            git \
            --log-opts="--all" \
            --config=".gitleaks.toml" \
            --report-format=json \
            --report-path=gitleaks-report.json \
            --verbose

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

      - name: Create GitHub issue on secret detection
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Gitleaks detected secrets in the repository",
              body: "Gitleaks detected one or more secrets. Review the failed workflow run and download the gitleaks-report artifact.",
              labels: ["security"]
            })