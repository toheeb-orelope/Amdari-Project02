name: Gitleaks Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks full history scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/path \
            --workdir /path \
            ghcr.io/gitleaks/gitleaks:latest \
            git \
            --log-opts="--all" \
            --config=".gitleaks.toml" \
            --verbose

      - name: Alert on secret detection
        if: failure()
        run: |
          echo "Secret detected by Gitleaks. Review the failed workflow logs immediately."