name: Checkov IaC Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  checkov-terraform:
    name: Checkov Terraform Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov Terraform scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/terraform
          framework: terraform
          output_format: cli,sarif,json
          output_file_path: console,checkov-terraform.sarif,checkov-terraform.json
          soft_fail: true

      - name: Upload Checkov Terraform SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov-terraform.sarif
          category: checkov-terraform

      - name: Upload Terraform Checkov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-terraform-report
          path: |
            checkov-terraform.json
            checkov-terraform.sarif

      - name: Hard fail Terraform on Stage 3/4 blocking checks
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import sys

          report_file = "checkov-terraform.json"

          STAGE_3_BLOCKING_IDS = {
              "CKV_AWS_17",
              "CKV_AWS_38",
              "CKV_AWS_39",
              "CKV_AWS_260",
              "CKV_AWS_277",
              "CKV_AWS_382",
              "CKV_AWS_16",
              "CKV_AWS_37",
              "CKV_AWS_58",
              "CKV_AWS_129",
          }

          STAGE_4_BLOCKING_IDS = {
              "CKV_AWS_62",
              "CKV_AWS_63",
              "CKV_AWS_274",
              "CKV_AWS_286",
              "CKV_AWS_287",
              "CKV_AWS_288",
              "CKV_AWS_289",
              "CKV_AWS_290",
              "CKV_AWS_355",
          }

          BLOCKING_IDS = STAGE_3_BLOCKING_IDS | STAGE_4_BLOCKING_IDS

          try:
              with open(report_file, "r", encoding="utf-8") as f:
                  data = json.load(f)
          except FileNotFoundError:
              print(f"{report_file} not found.")
              sys.exit(1)

          failed = data.get("results", {}).get("failed_checks", [])
          blocking = []

          for check in failed:
              if check.get("check_id") in BLOCKING_IDS:
                  blocking.append(check)

          print(f"Terraform Stage 3/4 blocking findings: {len(blocking)}")

          if blocking:
              for item in blocking:
                  check_id = item.get("check_id")
                  stage = "Stage 3" if check_id in STAGE_3_BLOCKING_IDS else "Stage 4"

                  print(
                      f"- {stage} | "
                      f"{check_id} | "
                      f"{item.get('file_path')} | "
                      f"{item.get('check_name')}"
                  )

              sys.exit(1)

          print("No Terraform Stage 3/4 blocking findings found.")
          PY

  checkov-kubernetes:
    name: Checkov Kubernetes Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov Kubernetes scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/kubernetes
          framework: kubernetes
          output_format: cli,sarif,json
          output_file_path: console,checkov-kubernetes.sarif,checkov-kubernetes.json
          soft_fail: true

      - name: Upload Checkov Kubernetes SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov-kubernetes.sarif
          category: checkov-kubernetes

      - name: Upload Kubernetes Checkov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-kubernetes-report
          path: |
            checkov-kubernetes.json
            checkov-kubernetes.sarif

      - name: Hard fail Kubernetes on Stage 4 blocking checks
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import sys

          report_file = "checkov-kubernetes.json"

          STAGE_4_BLOCKING_IDS = {
              "CKV_K8S_16",
              "CKV_K8S_20",
              "CKV_K8S_22",
              "CKV_K8S_23",
              "CKV_K8S_30",
              "CKV_K8S_31",
              "CKV_K8S_37",
              "CKV_K8S_40",
          }

          try:
              with open(report_file, "r", encoding="utf-8") as f:
                  data = json.load(f)
          except FileNotFoundError:
              print(f"{report_file} not found.")
              sys.exit(1)

          failed = data.get("results", {}).get("failed_checks", [])
          blocking = []

          for check in failed:
              if check.get("check_id") in STAGE_4_BLOCKING_IDS:
                  blocking.append(check)

          print(f"Kubernetes Stage 4 blocking findings: {len(blocking)}")

          if blocking:
              for item in blocking:
                  print(
                      f"- Stage 4 | "
                      f"{item.get('check_id')} | "
                      f"{item.get('file_path')} | "
                      f"{item.get('check_name')}"
                  )

              sys.exit(1)

          print("No Kubernetes Stage 4 blocking findings found.")
          PY