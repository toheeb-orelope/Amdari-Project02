name: Checkov IaC Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  checkov-terraform:
    name: Checkov Terraform Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov Terraform scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/terraform
          framework: terraform
          output_format: cli,sarif,json
          output_file_path: console,checkov-terraform.sarif,checkov-terraform.json
          soft_fail: true

      - name: Upload Checkov Terraform SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov-terraform.sarif
          category: checkov-terraform

      - name: Upload Terraform Checkov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-terraform-report
          path: |
            checkov-terraform.json
            checkov-terraform.sarif

      - name: Hard fail Terraform only on HIGH/CRITICAL
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import sys

          report_file = "checkov-terraform.json"

          try:
              with open(report_file, "r", encoding="utf-8") as f:
                  data = json.load(f)
          except FileNotFoundError:
              print(f"{report_file} not found.")
              sys.exit(1)

          failed = data.get("results", {}).get("failed_checks", [])
          blocking = []

          for check in failed:
              severity = str(check.get("severity", "")).upper()
              if severity in ["HIGH", "CRITICAL"]:
                  blocking.append(check)

          print(f"Terraform HIGH/CRITICAL findings: {len(blocking)}")

          if blocking:
              for item in blocking:
                  print(
                      f"- {item.get('severity')} | "
                      f"{item.get('check_id')} | "
                      f"{item.get('file_path')} | "
                      f"{item.get('check_name')}"
                  )
              sys.exit(1)

          print("No HIGH/CRITICAL Terraform findings found.")
          PY

  checkov-kubernetes:
    name: Checkov Kubernetes Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov Kubernetes scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/kubernetes
          framework: kubernetes
          output_format: cli,sarif,json
          output_file_path: console,checkov-kubernetes.sarif,checkov-kubernetes.json
          soft_fail: true

      - name: Upload Checkov Kubernetes SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov-kubernetes.sarif
          category: checkov-kubernetes

      - name: Upload Kubernetes Checkov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-kubernetes-report
          path: |
            checkov-kubernetes.json
            checkov-kubernetes.sarif

      - name: Hard fail Kubernetes only on HIGH/CRITICAL
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import sys

          report_file = "checkov-kubernetes.json"

          try:
              with open(report_file, "r", encoding="utf-8") as f:
                  data = json.load(f)
          except FileNotFoundError:
              print(f"{report_file} not found.")
              sys.exit(1)

          failed = data.get("results", {}).get("failed_checks", [])
          blocking = []

          for check in failed:
              severity = str(check.get("severity", "")).upper()
              if severity in ["HIGH", "CRITICAL"]:
                  blocking.append(check)

          print(f"Kubernetes HIGH/CRITICAL findings: {len(blocking)}")

          if blocking:
              for item in blocking:
                  print(
                      f"- {item.get('severity')} | "
                      f"{item.get('check_id')} | "
                      f"{item.get('file_path')} | "
                      f"{item.get('check_name')}"
                  )
              sys.exit(1)

          print("No HIGH/CRITICAL Kubernetes findings found.")
          PY
          