name: Checkov IaC Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  checkov:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov Terraform scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/terraform
          framework: terraform
          output_format: cli,sarif,json
          output_file_path: console,checkov-terraform.sarif,checkov-terraform.json
          soft_fail: false

      - name: Run Checkov Kubernetes scan
        if: always()
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/kubernetes
          framework: kubernetes
          output_format: cli,sarif,json
          output_file_path: console,checkov-kubernetes.sarif,checkov-kubernetes.json
          soft_fail: false

      - name: Upload Checkov Terraform SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov-terraform.sarif

      - name: Upload Checkov Kubernetes SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov-kubernetes.sarif

      - name: Upload Checkov reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-security-reports
          path: |
            checkov-terraform.json
            checkov-kubernetes.json
            checkov-terraform.sarif
            checkov-kubernetes.sarif