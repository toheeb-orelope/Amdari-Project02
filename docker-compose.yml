# SecureFlow docker-compose — INTENTIONALLY VULNERABLE.
# Planted vulnerabilities:
#   IV-01  hardcoded DB password
#   IV-02  databases exposed on host network (ports 5432, 5433)
#   IV-03  secrets in environment variables (SECRET_KEY, SESSION_SECRET, DB_PASSWORD)
#   IV-06  no resource limits
#   IV-07  no network segmentation between services
#   CK-03  redacted:14 used without digest pinning

version: "3.8"

services:
  auth-db:
    image:  redacted:14@sha256:a209aced4fa19381231fae4d9a4c5816f7691294f13572f8bddc082ba32e1c7c
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME}
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    ports:
      - "5432:5432"          # IV-02 — exposed on host.
    volumes:
      - ./db/auth/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - auth-db-data:/var/lib/redactedql/data

  transaction-db:
    image:  redacted:14@sha256:a209aced4fa19381231fae4d9a4c5816f7691294f13572f8bddc082ba32e1c7c
    environment:
      POSTGRES_DB: ${TRANSACTION_DB_NAME}
      POSTGRES_USER: ${TRANSACTION_DB_USER}
      POSTGRES_PASSWORD: ${TRANSACTION_DB_PASSWORD}
    ports:
      - "5433:5432"          # IV-02 — exposed on host.
    volumes:
      - ./db/transaction/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - transaction-db-data:/var/lib/redactedql/data

  auth-service:
    build: ./services/auth-service
    ports:
      - "5001:5001"
    depends_on:
      - auth-db

  transaction-service:
    build: ./services/transaction-service
    ports:
      - "5002:5002"
    depends_on:
      - transaction-db
      - auth-service

  frontend:
    build: ./services/frontend
    # Secrets supplied via Vault
    ports:
      - "5000:5000"
    depends_on:
      - auth-service
      - transaction-service

volumes:
  auth-db-data:
  transaction-db-data:

# IV-06 — no `deploy.resources.limits` on any service.
# IV-07 — no user-defined network isolation; everything on the default bridge.
