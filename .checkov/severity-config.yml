# .checkov/severity-config.yml
#
# Single source of truth for Checkov blocking severity gates.
# Edit this file (not the workflow YAML) to change blocking behaviour.
#
# Checkov severity values: CRITICAL | HIGH | MEDIUM | LOW | INFO
#
# always_block_ids  – always block regardless of assigned severity
#                     (use for newly-added checks not yet classified upstream)
# never_block_ids   – never block even if severity matches
#                     (MUST include a reason and a tracking reference)

terraform:
  stage3_block_severities: [CRITICAL, HIGH]
  stage4_block_severities:  [CRITICAL, HIGH, MEDIUM]

  always_block_ids: []
  # Example:
  # always_block_ids:
  #   - CKV_AWS_999   # New S3 public-access check, not yet rated by Prisma (added 2025-06-01)

  never_block_ids: []
  # Example:
  # never_block_ids:
  #   - id: CKV_AWS_144
  #     reason: "S3 cross-region replication not applicable to ephemeral dev buckets. Tracked: JIRA-4521"

kubernetes:
  stage4_block_severities: [CRITICAL, HIGH]

  always_block_ids: []

  never_block_ids: []

