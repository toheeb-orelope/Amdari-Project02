title = "SecureFlow Gitleaks Config"

[extend]
useDefault = true

[[rules]]
id = "secureflow-jwt-secret"
description = "Detect JWT secret"
regex = '''(?i)(JWT_SECRET|SECRET_KEY)\s*[:=]\s*["']?([A-Za-z0-9_\-]{8,})["']?'''
secretGroup = 2
entropy = 3.5
keywords = ["jwt", "secret", "token"]

[[rules.allowlists]]
stopwords = ["example", "test"]

[[rules]]
id = "secureflow-known-weak-secrets"
description = "Detect known weak SecureFlow lab secrets"
regex = '''(?i)(JWT_SECRET|SECRET_KEY|SESSION_SECRET|DB_PASSWORD|POSTGRES_PASSWORD)\s*[:=]\s*["']?(redacted|redacted|redacted|redacted|redacted)["']?'''
secretGroup = 2
keywords = ["secret", "password", "jwt", "redacted"]

[[rules]]
id = "secureflow-db-connection-string"
description = "Detect database connection strings containing credentials"
regex = '''(?i)(DATABASE_URL|DB_URL|CONNECTION_STRING|POSTGRES_URL)\s*[:=]\s*["']?(redactedql|redacted|mysql|mongodb)://[^:\s'"]+:([^@\s'"]+)@[^/\s'"]+'''
secretGroup = 3
keywords = ["database", "redacted", "mysql", "mongodb", "connection"]