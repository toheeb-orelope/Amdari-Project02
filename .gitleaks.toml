title = "SecureFlow Gitleaks Config"

[extend]
useDefault = true

[[rules]]
id = "secureflow-jwt-secret"
description = "Detect JWT secret"
regex = '''(?i)(JWT_SECRET|SECRET_KEY)\s*[:=]\s*["']?([A-Za-z0-9_\-]{8,})["']?'''
secretGroup = 2
entropy = 3.5
keywords = ["jwt", "secret", "token"]

[[rules.allowlists]]
stopwords = ["example", "test"]

[[rules]]
id = "secureflow-known-weak-secrets"
description = "Detect known weak SecureFlow lab secrets"
regex = '''(?i)(JWT_SECRET|SECRET_KEY|SESSION_SECRET|DB_PASSWORD|POSTGRES_PASSWORD)\s*[:=]\s*["']?(super-secret-key-123|changeme|txpass123|authpass123|postgres)["']?'''
secretGroup = 2
keywords = ["secret", "password", "jwt", "postgres"]